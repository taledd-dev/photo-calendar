<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photo Location Calendar 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { background: #E5DCC6; }
    ::selection { background: #54632F; color: #FBF7EC; }
    [contenteditable] { outline: none; }
    [contenteditable]:focus { box-shadow: 0 0 0 2px rgba(84,99,47,0.35); background: #FFFDF5; border-radius: 3px; }
    .btn-hover:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(42,37,30,0.16) !important; }
    .btn-hover:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(42,37,30,0.12) !important; }
    .tile:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(42,37,30,0.12) !important; }
    .ev-chip:hover { box-shadow: 0 2px 6px rgba(42,37,30,0.28); filter: brightness(1.03); }
    .loc-row:hover { background: #F4EEDE !important; }
    .month-link:hover { opacity: 0.65; }
    .year-link:hover { color: #54632F !important; }
    .del-btn:hover { background: #9C3B22 !important; color: #FBF7EC !important; border-color: #9C3B22 !important; }
    .add-ev-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(42,37,30,0.16) !important; }
    .add-ev-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(42,37,30,0.12) !important; }
    .save-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(42,37,30,0.18) !important; }
    .save-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(42,37,30,0.12) !important; }
    .close-btn:hover { background: #EFE7D2 !important; color: #2A251E !important; }
    .tick-btn:hover { border-color: #54632F !important; background: #fff !important; }
    .region-uk:hover { background: #54632F !important; color: #FBF7EC !important; }
    .region-int:hover { background: #9E4B26 !important; color: #FBF7EC !important; }
    .done-toggle:hover { background: #E4E8D0 !important; border-color: #54632F !important; }
    .image-slot { position: relative; display: flex; align-items: center; justify-content: center; background: #EFE7D2; overflow: hidden; cursor: default; }
    .image-slot.drag-over { background: #E4E8D0; outline: 2px dashed #54632F; }
    .image-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .image-slot .placeholder-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #A89A7C; letter-spacing: .06em; text-align: center; padding: 12px; pointer-events: none; z-index: 1; }
    .image-slot .drop-hint { display: none; }
    .image-slot:hover .drop-hint { display: block; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: auto; }
    input:focus { border-color: #54632F !important; box-shadow: 0 0 0 2px rgba(84,99,47,0.22) !important; }
    .kind-btn:hover { filter: brightness(0.97); }
    .loc-pick:hover { border-color: #54632F !important; }
    .hero-caption { position: absolute; left: 0; bottom: 0; z-index: 5; max-width: 88%; background: #000; color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.4; padding: 6px 11px; letter-spacing: .02em; }
    .hero-caption:empty::before { content: attr(data-ph); color: #B7B0A2; }
    .hero-caption:focus { outline: none; background: #000 !important; color: #fff !important; border-radius: 0 !important; box-shadow: 0 0 0 2px rgba(84,99,47,0.6); }
    .slide-fade { animation: heroFade .9s ease; }
    @keyframes heroFade { from { opacity: 0; } to { opacity: 1; } }
    .year-input:empty::before { content: 'YY'; color: #B7AD90; }
    .coord-input:empty::before { content: 'paste latitude, longitude'; color: #B7AD90; }
    .kit-view:hover span { border-color: #54632F; }
    .tag-input:empty::before { content: 'Label'; color: #B7AD90; }
    .pause-btn:hover { background: rgba(42,37,30,0.78) !important; }
    .pause-btn:active { transform: scale(0.94); }
    .map-chip:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(42,37,30,0.14) !important; }
    .map-monthchip:hover { border-color: #2A251E !important; }
    .map-iconbtn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(42,37,30,0.18) !important; }
    .map-iconbtn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(42,37,30,0.12) !important; }
    .map-shootrow:hover { background: #F1EAD6 !important; }
    .map-close:hover { color: #2A251E !important; background: #EFE7D2 !important; border-color: #D2C7AC !important; }
    .map-visitbtn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(42,37,30,0.16) !important; }
    @keyframes mapPulse { 0%,100% { opacity: .45; } 50% { opacity: .9; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const e = React.createElement;

// ─── Storage ────────────────────────────────────────────────────────────────
// The single "switch" for where saved data lives. Calendar text (locations,
// events, edits) is kept in the browser's local storage. PHOTOS now live in the
// cloud (Cloudflare R2), reached through the storage Worker below, so they are
// shared across devices and visible to anyone viewing the calendar.
const STORAGE_VERSION = 1;

// The web address of your storage Worker — the safe gatekeeper in front of R2.
// Photos are read from / written to `${PHOTO_STORAGE_BASE}/photo/<name>`.
const PHOTO_STORAGE_BASE = 'https://photo-calendar-storage.taledd95.workers.dev';

const Storage = {
  loadData() {
    try {
      const raw = localStorage.getItem('calendar:data');
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.version !== STORAGE_VERSION) return null;
      return parsed.data;
    } catch (_) { return null; }
  },
  saveData(data) {
    try { localStorage.setItem('calendar:data', JSON.stringify({ version: STORAGE_VERSION, data })); } catch (_) {}
  },
  clearData() {
    try { localStorage.removeItem('calendar:data'); } catch (_) {}
  },
  // ── Photos: stored in R2 via the Worker. Anyone can view; uploading or ──────
  // removing requires the upload password (kept only in the owner's browser).
  photoUrl(id, bust) {
    return PHOTO_STORAGE_BASE + '/photo/' + encodeURIComponent(id) + (bust ? ('?t=' + bust) : '');
  },
  getUploadKey() {
    let k = null;
    try { k = localStorage.getItem('calendar:uploadKey'); } catch (_) {}
    if (!k) {
      k = window.prompt('Enter your upload password to add or change photos:');
      if (k) { try { localStorage.setItem('calendar:uploadKey', k); } catch (_) {} }
    }
    return k;
  },
  clearUploadKey() {
    try { localStorage.removeItem('calendar:uploadKey'); } catch (_) {}
  },
  async saveImage(id, file, key) {
    try {
      const res = await fetch(this.photoUrl(id), {
        method: 'PUT',
        headers: { 'x-upload-key': key, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (res.status === 401) { this.clearUploadKey(); alert('That upload password was not accepted — please try again.'); return false; }
      if (!res.ok) { alert('Upload failed (' + res.status + '). Please try again.'); return false; }
      return true;
    } catch (_) { alert('Could not reach photo storage. Check your connection and try again.'); return false; }
  },
  async removeImage(id, key) {
    try {
      const res = await fetch(this.photoUrl(id), { method: 'DELETE', headers: { 'x-upload-key': key } });
      if (res.status === 401) { this.clearUploadKey(); alert('That upload password was not accepted — please try again.'); return false; }
      return res.ok;
    } catch (_) { alert('Could not reach photo storage to remove the photo.'); return false; }
  },
  // Read the stored upload password WITHOUT prompting (used to tell whether
  // this browser is the owner's, so viewers never get asked for a password).
  peekUploadKey() {
    try { return localStorage.getItem('calendar:uploadKey'); } catch (_) { return null; }
  },
  // Photo metadata (currently the "year taken" for each location) is shared via a
  // tiny JSON file in R2, so everyone viewing the calendar sees the same info —
  // captions are otherwise built automatically from the location name and month.
  async loadMeta() {
    try {
      const res = await fetch(this.photoUrl('photo-meta.json', Date.now()), { cache: 'no-store' });
      if (!res.ok) return null;
      return await res.json();
    } catch (_) { return null; }
  },
  async saveMeta(meta, key) {
    try {
      const res = await fetch(this.photoUrl('photo-meta.json'), {
        method: 'PUT',
        headers: { 'x-upload-key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify(meta),
      });
      if (res.status === 401) { this.clearUploadKey(); alert('That upload password was not accepted — please try again.'); return false; }
      return res.ok;
    } catch (_) { return false; }
  },
  // The whole calendar dataset (locations, events, edits, coordinates, ticks) is
  // shared via calendar-data.json in R2 — everyone reads it, only the owner (with
  // the upload password) writes it. Local storage stays a fast, offline cache.
  async loadCloudData() {
    try {
      const res = await fetch(this.photoUrl('calendar-data.json', Date.now()), { cache: 'no-store' });
      if (!res.ok) return null;
      const parsed = await res.json();
      if (!parsed || parsed.version !== STORAGE_VERSION || !parsed.data) return null;
      return parsed.data;
    } catch (_) { return null; }
  },
  async saveCloudData(data, key) {
    try {
      const res = await fetch(this.photoUrl('calendar-data.json'), {
        method: 'PUT',
        headers: { 'x-upload-key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ version: STORAGE_VERSION, savedAt: Date.now(), data }),
      });
      if (res.status === 401) { this.clearUploadKey(); return false; }
      return res.ok;
    } catch (_) { return false; }
  },
  // Save an uploaded photo as two sizes: a small thumbnail (<base>-thumb) for the
  // location cards and a larger hero version (<base>) for the slideshows.
  async savePhotoVariants(base, file, key) {
    let hero, thumb;
    try {
      hero = await resizeImage(file, 1600, 0.85);
      thumb = await resizeImage(file, 500, 0.8);
    } catch (_) { alert('Could not process that image — please try a different photo.'); return false; }
    const okHero = await this.saveImage(base, hero || file, key);
    if (!okHero) return false;
    const okThumb = await this.saveImage(base + '-thumb', thumb || hero || file, key);
    return okThumb;
  },
  async removePhotoVariants(base, key) {
    const ok = await this.removeImage(base, key);
    await this.removeImage(base + '-thumb', key);
    return ok;
  },
};

// ─── Helpers ────────────────────────────────────────────────────────────────
// Fisher–Yates shuffle — returns a new array in random order.
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shrink an uploaded photo to a max edge length and return a JPEG Blob. Used to
// make a small thumbnail (for the location cards) and a larger hero version (for
// the slideshows) from the same upload. Respects EXIF orientation on phones.
async function resizeImage(file, maxEdge, quality) {
  let source, width, height, bitmap = null;
  try {
    bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
    source = bitmap; width = bitmap.width; height = bitmap.height;
  } catch (_) {
    source = await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = URL.createObjectURL(file);
    });
    width = source.naturalWidth; height = source.naturalHeight;
  }
  const scale = Math.min(1, maxEdge / Math.max(width, height));
  const w = Math.max(1, Math.round(width * scale));
  const h = Math.max(1, Math.round(height * scale));
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(source, 0, 0, w, h);
  if (bitmap && bitmap.close) bitmap.close();
  return await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
}

// ─── Hero caption ─────────────────────────────────────────────────────────────
// A black caption box in the bottom-left of a hero photo. Click to type the
// location and month-year; it saves when you click away. Shows a faint prompt
// while empty. (Purely a display box on the slideshow, where `onCommit` is null.)
function HeroCaption({ value, onCommit }) {
  const ref = useRef(null);
  // Keep the displayed text in sync with the caption, but never overwrite it
  // while the user is actively typing (which would jump the cursor around).
  useEffect(() => {
    if (ref.current && document.activeElement !== ref.current && ref.current.textContent !== (value || '')) {
      ref.current.textContent = value || '';
    }
  }, [value]);
  const editable = typeof onCommit === 'function';
  const handleBlur = () => {
    const t = ref.current ? ref.current.textContent.trim() : '';
    if (t !== (value || '')) onCommit(t);
  };
  return e('div', {
    ref,
    className: 'hero-caption',
    contentEditable: editable,
    suppressContentEditableWarning: true,
    'data-ph': 'Location · Month Year',
    title: editable ? 'Click to caption this photo' : undefined,
    style: { cursor: editable ? 'text' : 'default' },
    onBlur: editable ? handleBlur : undefined,
    onClick: (ev) => ev.stopPropagation(),
  });
}

// ─── Photo slideshow ─────────────────────────────────────────────────────────
// Cycles through a set of photos in random order, changing every `intervalMs`.
// Each item is { key (unique), base (image name), caption }. It checks which
// photos exist using the small thumbnails (fast), then shows the hero version of
// whichever slide is current. Used for both the 2026 cover and each month's hero.
function PhotoSlideshow({ items, boxStyle, intervalMs = 15000, epoch = 0 }) {
  const [keys, setKeys] = useState([]); // item keys that have a photo, in order
  const [pos, setPos] = useState(0);
  const [paused, setPaused] = useState(false);
  const orderRef = useRef([]);
  const posRef = useRef(0);
  const sig = items.map(it => it.key + ':' + it.base).join('|');

  // Work out which items actually have a photo uploaded (skip empty ones).
  useEffect(() => {
    let cancelled = false;
    const candidates = items.filter(it => it.base);
    if (!candidates.length) { setKeys([]); return; }
    let pending = candidates.length;
    const ok = [];
    const finish = () => { if (!cancelled) setKeys(candidates.filter(c => ok.includes(c.key)).map(c => c.key)); };
    candidates.forEach(c => {
      const img = new Image();
      img.onload = () => { ok.push(c.key); if (--pending === 0) finish(); };
      img.onerror = () => { if (--pending === 0) finish(); };
      img.src = Storage.photoUrl(c.base + '-thumb', epoch || undefined);
    });
    return () => { cancelled = true; };
  }, [sig, epoch]);

  // Build a fresh random order whenever the set of photos changes; start playing.
  useEffect(() => {
    if (keys.length === 0) { orderRef.current = []; posRef.current = 0; setPos(0); return; }
    orderRef.current = shuffle(keys.map((_, i) => i));
    posRef.current = 0;
    setPos(orderRef.current[0]);
    setPaused(false);
  }, [keys]);

  // Advance on a timer unless paused (or there's only one photo). Pausing freezes
  // the photo on screen — it does not reshuffle or jump to a different image.
  useEffect(() => {
    if (paused || keys.length <= 1) return;
    const t = setInterval(() => {
      posRef.current++;
      if (posRef.current >= orderRef.current.length) { orderRef.current = shuffle(keys.map((_, i) => i)); posRef.current = 0; }
      setPos(orderRef.current[posRef.current]);
    }, intervalMs);
    return () => clearInterval(t);
  }, [keys, intervalMs, paused]);

  if (keys.length === 0) {
    return e('div', { className: 'image-slot', style: { ...boxStyle } },
      e('div', { className: 'placeholder-text' },
        e('div', null, 'Photo slideshow'),
        e('div', { style: { marginTop: 4, fontSize: 10, opacity: 0.7 } },
          'Add photos to the locations and they’ll cycle here')
      )
    );
  }

  const curKey = keys[pos] != null ? keys[pos] : keys[0];
  const cur = items.find(it => it.key === curKey);
  if (!cur) return e('div', { className: 'image-slot', style: { ...boxStyle } });
  return e('div', { className: 'image-slot', style: { ...boxStyle } },
    e('img', { key: cur.base, className: 'slide-fade', src: Storage.photoUrl(cur.base, epoch || undefined), alt: '' }),
    cur.caption && e(HeroCaption, { key: 'show-' + cur.key, value: cur.caption, onCommit: null }),
    keys.length > 1 && e('button', {
      className: 'pause-btn',
      onClick: () => setPaused(p => !p),
      title: paused ? 'Resume slideshow' : 'Pause slideshow',
      style: { position: 'absolute', right: 10, bottom: 10, zIndex: 6, width: 34, height: 34, borderRadius: '50%', border: 'none', cursor: 'pointer', background: 'rgba(42,37,30,0.55)', color: '#FBF7EC', fontSize: 13, lineHeight: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }
    }, paused ? '▶︎' : '❚❚')
  );
}

// ─── Location thumbnail ──────────────────────────────────────────────────────
// Shows the small thumbnail of a location's photo on its card (nothing if none).
function LocThumb({ base, epoch = 0 }) {
  const [src, setSrc] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const url = Storage.photoUrl(base + '-thumb', epoch || undefined);
    const probe = new Image();
    probe.onload = () => { if (!cancelled) setSrc(url); };
    probe.onerror = () => { if (!cancelled) setSrc(null); };
    probe.src = url;
    return () => { cancelled = true; };
  }, [base, epoch]);
  if (!src) return null;
  return e('img', { src, alt: '', style: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', zIndex: 1 } });
}

// ─── Location photo uploader ─────────────────────────────────────────────────
// The upload control on a location: drop/click a photo and it saves both a
// thumbnail and a hero version. Shows the thumbnail once set.
function LocationPhoto({ base, placeholder, style = {}, onChange }) {
  const [src, setSrc] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);
  const thumb = (bust) => Storage.photoUrl(base + '-thumb', bust);

  useEffect(() => {
    let cancelled = false;
    const probe = new Image();
    probe.onload = () => { if (!cancelled) setSrc(thumb()); };
    probe.onerror = () => { if (!cancelled) setSrc(null); };
    probe.src = thumb();
    return () => { cancelled = true; };
  }, [base]);

  const uploadFile = useCallback(async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const key = Storage.getUploadKey();
    if (!key) return;
    setBusy(true);
    const ok = await Storage.savePhotoVariants(base, file, key);
    setBusy(false);
    if (ok) { setSrc(thumb(Date.now())); if (onChange) onChange(); }
  }, [base, onChange]);

  const handleDrop = useCallback((ev) => {
    ev.preventDefault(); setDragOver(false);
    uploadFile(ev.dataTransfer.files[0]);
  }, [uploadFile]);

  const handleClear = useCallback(async (ev) => {
    ev.stopPropagation();
    const key = Storage.getUploadKey();
    if (!key) return;
    setBusy(true);
    const ok = await Storage.removePhotoVariants(base, key);
    setBusy(false);
    if (ok) { setSrc(null); if (onChange) onChange(); }
  }, [base, onChange]);

  return e('div', {
    className: 'image-slot' + (dragOver ? ' drag-over' : ''),
    style: { cursor: (src || busy) ? 'default' : 'pointer', ...style },
    onDragOver: (ev) => { ev.preventDefault(); setDragOver(true); },
    onDragLeave: () => setDragOver(false),
    onDrop: handleDrop,
    onClick: () => { if (!src && !busy && fileRef.current) fileRef.current.click(); },
  },
    e('input', { ref: fileRef, type: 'file', accept: 'image/*', style: { display: 'none' },
      onChange: (ev) => { const f = ev.target.files[0]; ev.target.value = ''; uploadFile(f); } }),
    src && e('img', { src, alt: '' }),
    src && !busy && e('button', {
      onClick: handleClear,
      title: 'Remove photo',
      style: { position: 'absolute', top: 6, right: 6, zIndex: 10, width: 24, height: 24, background: 'rgba(42,37,30,0.6)', border: 'none', color: '#FBF7EC', borderRadius: '50%', cursor: 'pointer', fontSize: 13, lineHeight: '1', display: 'flex', alignItems: 'center', justifyContent: 'center' }
    }, '×'),
    busy && e('div', { className: 'placeholder-text', style: { zIndex: 2 } }, 'Uploading…'),
    !src && !busy && e('div', { className: 'placeholder-text' },
      e('div', null, '↓ drop or click to add a photo'),
      e('div', { style: { marginTop: 4, fontSize: 10, opacity: 0.7 } }, placeholder)
    )
  );
}

// ─── Editable text field ──────────────────────────────────────────────────────
// An inline click-to-edit box. The trick: while you're typing, the page does NOT
// redraw this box (which is what used to throw the cursor to the start and make
// text appear backwards). It only saves your change once you click away (blur).
function Editable({ tag = 'div', value, onCommit, title, style, className }) {
  const ref = useRef(null);
  // Put the starting text in once when the box first appears (or when it's
  // pointed at a different location), without touching it again while editing.
  useEffect(() => {
    if (ref.current && ref.current.textContent !== (value || '')) {
      ref.current.textContent = value || '';
    }
  }, []);
  const handleBlur = () => {
    const text = ref.current ? ref.current.textContent : '';
    if (text !== value) onCommit(text);
  };
  return e(tag, {
    ref,
    contentEditable: true,
    suppressContentEditableWarning: true,
    onBlur: handleBlur,
    title, style, className,
  });
}

// ─── Kit field ────────────────────────────────────────────────────────────────
// Shows the kit as pill chips; click to edit as a single text line. Items can be
// separated by a "·" or just commas — both are normalised back to "·" chips.
function KitField({ value, onCommit }) {
  const [editing, setEditing] = useState(false);
  const mono = "'IBM Plex Mono',monospace";
  const items = (value || '').split(/[·,\n]/).map(s => s.trim()).filter(Boolean);
  const commit = (text) => {
    const parts = (text || '').split(/[·,\n]/).map(s => s.trim()).filter(Boolean);
    const joined = parts.join(' · ');
    if (joined !== (value || '')) onCommit(joined);
    setEditing(false);
  };
  if (!editing) {
    return e('div', { className: 'kit-view', onClick: () => setEditing(true), title: 'Click to edit', style: { display: 'flex', flexWrap: 'wrap', gap: 7, cursor: 'pointer' } },
      items.length

    );
  }
  return e('textarea', {
    autoFocus: true,
    defaultValue: items.join(' · '),
    onBlur: (ev) => commit(ev.target.value),

// ─── Calendar grid builder ─────────────────────────────────────────────────────
function buildWeeks(month, weekStart = 'Monday') {
  const leading = weekStart === 'Sunday' ? month.dow : (month.dow + 6) % 7;
  const cells = [];
  for (let i = 0; i < leading; i++) cells.push(null);
  for (let d = 1; d <= month.days; d++) cells.push(d);
  while (cells.length % 7) cells.push(null);

  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    const slice = cells.slice(i, i + 7);
    const present = slice.filter(x => x != null);
    if (!present.length) { weeks.push({ days: slice.map(d => ({ day: '', inMonth: false })), items: [] }); continue; }
    const wkStart = present[0], wkEnd = present[present.length - 1];
    const raw = [];
    for (const ev of month.events) {
      const s = ev.start != null ? ev.start : ev.day;
      const e2 = ev.end != null ? ev.end : ev.day;
      if (e2 < wkStart || s > wkEnd) continue;
      const segS = Math.max(s, wkStart), segE = Math.min(e2, wkEnd);
      const colStart = slice.indexOf(segS), colEnd = slice.indexOf(segE);
      if (colStart === -1 || colEnd === -1) continue;
      raw.push({ ev, colStart, colEnd, contRight: e2 > wkEnd });
    }
    raw.sort((a, b) => a.colStart - b.colStart || (b.colEnd - b.colStart) - (a.colEnd - a.colStart));
    const lanes = [];
    for (const it of raw) {
      let placed = false;
      for (let li = 0; li < lanes.length; li++) {
        if (lanes[li].every(o => it.colStart > o.colEnd || it.colEnd < o.colStart)) {
          lanes[li].push(it); it.lane = li; placed = true; break;
        }
      }
      if (!placed) { it.lane = lanes.length; lanes.push([it]); }
    }
    const items = raw.map(it => {
      const ev = it.ev;
      const st = EVENT_STYLE[ev.kind] || EVENT_STYLE.season;
      return {
        id: ev.id,
        ev,
        label: ev.label,
        glyph: st.glyph,
        hasGlyph: !!st.glyph,
        left: (it.colStart / 7 * 100).toFixed(4) + '%',
        width: ((it.colEnd - it.colStart + 1) / 7 * 100).toFixed(4) + '%',
        top: (30 + it.lane * 23) + 'px',
        bg: st.bg, fg: st.fg, accent: st.accent,
        contRight: it.contRight,
      };
    });
    weeks.push({ days: slice.map(d => ({ day: d == null ? '' : String(d), inMonth: d != null })), items });
  }
  return weeks;
}

// Build one map pin per location (grouping any location that recurs across
// months into a single pin with all its shoots), from the live calendar data.
function buildMapPlaces(data) {
  const byId = {};
  data.forEach((m, mi) => m.locations.forEach(loc => {
    const own = (typeof loc.lat === 'number' && typeof loc.lng === 'number');
    const c = own ? [loc.lat, loc.lng] : LOCATION_COORDS[loc.id];
    if (!c) return; // no coordinates yet — skip until one is set in the detail panel
    let p = byId[loc.id];
    if (!p) p = byId[loc.id] = { id: loc.id, name: loc.name, where: loc.where, region: loc.region, lat: c[0], lng: c[1], shoots: [], visited: false };
    p.shoots.push({ mi, monthName: m.name, tag: loc.tag });
    if (loc.done) p.visited = true;
  }));
  return Object.values(byId);
}

// The "lat, lng" text shown in a location's detail panel — its own coordinates if
// set, otherwise the built-in ones, otherwise blank (so it can be added).
function locCoordText(loc) {
  let la = (typeof loc.lat === 'number') ? loc.lat : null;
  let lo = (typeof loc.lng === 'number') ? loc.lng : null;
  if (la == null) { const fb = LOCATION_COORDS[loc.id]; if (fb) { la = fb[0]; lo = fb[1]; } }
  return (la != null && lo != null) ? (la.toFixed(5) + ', ' + lo.toFixed(5)) : '';
}

// Photos live under a "photos/" folder in R2, keyed by month + location id, kept
// separate from the calendar-data.json file at the bucket root.
function photoBase(monthKey, locId) { return 'photos/' + monthKey + '-ref-' + locId; }

// Turn a name into a filename-friendly slug — used as the id for new locations so
// their photos get readable names like photos/apr-ref-jasper.
function slugify(s) {
  return (s || '').toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
}

function ensureScript(src) {
  return new Promise((resolve, reject) => {
    const existing = Array.prototype.find.call(document.scripts, s => s.src === src);
    if (existing) {
      if (existing.getAttribute('data-loaded')) return resolve();
      existing.addEventListener('load', () => resolve());
      existing.addEventListener('error', reject);
      return;
    }
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { s.setAttribute('data-loaded', '1'); resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

    if (!pts.length) return null;
    const proj = d3.geoMercator();
    proj.fitExtent([[m, m], [W - m, H - m]], { type: 'MultiPoint', coordinates: pts });

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => Storage.loadData() || makeData());
  const [yearView, setYearView] = useState(true);
  const [mapView, setMapView] = useState(false);
  const [monthIdx, setMonthIdx] = useState(0);
  const [selectedLoc, setSelectedLoc] = useState('lake-district');
  const [editingEvent, setEditingEvent] = useState(null);
  const [draggingLoc, setDraggingLoc] = useState(null);
  const [dragOverLoc, setDragOverLoc] = useState(null);
  const [weekStart] = useState('Monday');
  const [showEvents] = useState(true);
  const [heroFraming] = useState('Matted print');
  const [imgEpoch, setImgEpoch] = useState(0); // bumped after an upload so tiles + slideshows refresh
  const bumpImg = () => setImgEpoch(n => n + 1);
  const uidRef = useRef(100);
  const cloudEcho = useRef(false);      // true when data was just set from the cloud (don't re-save it)
  const cloudSaveTimer = useRef(null);
  const [cloudReady, setCloudReady] = useState(false); // true once the cloud load has settled (gates saving)

  // Save the calendar (locations, events, edits, ordering, ticked-off spots)
  // every time anything changes, so it survives a page reload.
  useEffect(() => { Storage.saveData(data); }, [data]);

  // Load the shared calendar from the cloud on startup so every device and every
  // viewer sees the same data. Local storage shows instantly; the cloud copy (if
  // present) then overrides it. `cloudReady` flips on only once this has settled,
  // which gates saving so a fresh device can't overwrite the cloud with defaults
  // before the load lands.
  useEffect(() => {
    let cancelled = false;
    Storage.loadCloudData().then(cloud => {
      if (cancelled) return;
      if (cloud) { cloudEcho.current = true; setData(cloud); }
      setCloudReady(true);
    });
  }, []);

  // Push the shared calendar back to the cloud whenever it changes — owner only
  // (whoever holds the upload password). Debounced; only after the load has
  // settled; and skips the echo from the load itself.
  useEffect(() => {
    if (!cloudReady) return;
    if (cloudEcho.current) { cloudEcho.current = false; return; }
    const key = Storage.peekUploadKey();
    if (!key) return;
    clearTimeout(cloudSaveTimer.current);
    cloudSaveTimer.current = setTimeout(() => { Storage.saveCloudData(data, key); }, 800);
    return () => clearTimeout(cloudSaveTimer.current);
  }, [data, cloudReady]);

  const month = data[Math.min(monthIdx, data.length - 1)];
  const matted = heroFraming === 'Matted print';
  const mapPlaces = useMemo(() => buildMapPlaces(data), [data]);

  // Backfill each built-in location's own map coordinates from the table, so the
  // coordinates field is populated now that the postcode has been retired.
  useEffect(() => {
    setData(prev => {
      let changed = false;
      const d = prev.map(m => ({ ...m, locations: m.locations.map(l => {
        if ((typeof l.lat !== 'number' || typeof l.lng !== 'number') && LOCATION_COORDS[l.id]) {
          changed = true;
          return { ...l, lat: LOCATION_COORDS[l.id][0], lng: LOCATION_COORDS[l.id][1] };
        }
        return l;
      }) }));
      return changed ? d : prev;
    });
  }, []);

  const goToYear = () => { setMapView(false); setYearView(true); };
  const goToMap = () => setMapView(true);
  const goToMonth = (idx, locId) => {
    const m = data[idx];
    if (!m) return;
    setMapView(false);
    setYearView(false);
    setMonthIdx(idx);
    setSelectedLoc(locId || (m.locations[0] ? m.locations[0].id : null));
  };
  const goToJan = () => goToMonth(0, null);
  const changeMonth = (dir) => {
    const n = data.length;
    const pos = yearView ? 0 : (monthIdx + 1);
    const next = (pos + dir + n + 1) % (n + 1);
    setMapView(false);
    if (next === 0) { setYearView(true); return; }
    const idx = next - 1;
    const first = data[idx].locations[0];
    setYearView(false);
    setMonthIdx(idx);
    setSelectedLoc(first ? first.id : null);
  };

  const mutateData = (fn) => setData(prev => { const d = prev.map(m => ({ ...m, locations: m.locations.map(l => ({ ...l })), events: m.events.map(e2 => ({ ...e2 })) })); fn(d); return d; });

  // Toggle a location's "done"/visited state wherever it lives (used by the map,
  // whose pins can belong to any month, not just the current one).
  const toggleVisitedById = (locId) => {
    mutateData(d => { for (const m of d) { const loc = m.locations.find(l => l.id === locId); if (loc) { loc.done = !loc.done; break; } } });
  };

  const addLocation = () => {
    const nameInput = window.prompt('Name of the new location:', '');
    if (nameInput === null) return; // cancelled
    const name = nameInput.trim() || 'New location';
    // Readable, unique id derived from the name — this becomes part of the photo filename.
    const existing = new Set(data.flatMap(m => m.locations.map(l => l.id)));
    const slugBase = slugify(name) || 'location';
    let id = slugBase, n = 2;
    while (existing.has(id)) { id = slugBase + '-' + (n++); }
    mutateData(d => {
      d[monthIdx].locations.push({ id, region:'UK', name, tag:'New spot', done:false, where:'Where is it?', idea:'Describe the shot you have in mind — what makes this spot worth the trip.', when:'Best season, time of day and conditions to aim for.', kit:'Lens · Tripod' });
    });
    setSelectedLoc(id);
  };

  const deleteLocation = (id) => {
    // Also remove this location's photo (hero + thumbnail) from R2, so deleting a
    // spot doesn't leave orphaned images in the bucket. Only the owner (who holds
    // the upload password) can delete; a viewer's delete just changes their view.
    const key = Storage.peekUploadKey();
    if (key) Storage.removePhotoVariants(photoBase(month.key, id), key);
    let nextSel = null;
    mutateData(d => {
      const locs = d[monthIdx].locations;
      const i = locs.findIndex(l => l.id === id);
      if (i === -1) return;
      locs.splice(i, 1);
      const next = locs[i] || locs[i - 1] || null;
      nextSel = next ? next.id : null;
    });
    setSelectedLoc(nextSel);
  };

  const toggleRegion = (id) => {
    mutateData(d => {
      const loc = d[monthIdx].locations.find(l => l.id === id);
      if (loc) loc.region = loc.region === 'UK' ? 'INT' : 'UK';
    });
  };

  const toggleDone = (id) => {
    mutateData(d => {
      const loc = d[monthIdx].locations.find(l => l.id === id);
      if (loc) loc.done = !loc.done;
    });
  };

  const reorderLoc = (fromId, toId) => {
    if (!fromId || fromId === toId) return;
    mutateData(d => {
      const arr = d[monthIdx].locations;
      const fromI = arr.findIndex(l => l.id === fromId);
      const toI = arr.findIndex(l => l.id === toId);
      if (fromI === -1 || toI === -1) return;
      const [moved] = arr.splice(fromI, 1);
      arr.splice(toI, 0, moved);
    });
  };

  const editField = (locId, field, value) => {
    mutateData(d => {
      const loc = d[monthIdx].locations.find(l => l.id === locId);
      if (loc) loc[field] = value;
    });
  };

  const setPhotoYear = (locId, year) => {
    const y = (year || '').trim();
    mutateData(d => { const loc = d[monthIdx].locations.find(l => l.id === locId); if (loc) loc.photoYear = y; });
  };

  // Set a location's map coordinates from pasted "latitude, longitude" text.
  // Clearing the field removes them (so it falls back to any built-in coords).
  const setLocCoords = (locId, text) => {
    const nums = (text || '').split(/[,\s]+/).map(x => parseFloat(x)).filter(x => !isNaN(x));
    const has = nums.length >= 2;
    mutateData(d => {
      for (const m of d) {
        const loc = m.locations.find(l => l.id === locId);
        if (loc) { if (has) { loc.lat = nums[0]; loc.lng = nums[1]; } else { delete loc.lat; delete loc.lng; } break; }
      }
    });
  };

  const addEvent = () => {
    uidRef.current++;
    const id = 'ev-new-' + uidRef.current;
    mutateData(d => { d[monthIdx].events.push({ id, type:'range', start:1, end:3, kind:'nature', label:'New event' }); });
    setEditingEvent({ id, label:'New event', start:'1', end:'3', kind:'nature', locId:null, isNew:true });
  };

  const openEventEditor = (evId) => {
    const ev = month.events.find(e2 => e2.id === evId);
    if (!ev) return;
    const s = ev.start != null ? ev.start : ev.day;
    const e2 = ev.end != null ? ev.end : ev.day;
    setEditingEvent({ id: evId, label: ev.label, start: String(s), end: String(e2), kind: ev.kind, locId: ev.locId || null, isNew: false });
  };

  const saveEvent = () => {
    if (!editingEvent) return;
    const d2 = editingEvent;
    mutateData(d => {
      const ev = d[monthIdx].events.find(e2 => e2.id === d2.id);
      if (!ev) return;
      let s = parseInt(d2.start, 10); if (isNaN(s)) s = 1;
      let e2 = parseInt(d2.end, 10); if (isNaN(e2)) e2 = s;
      const days = d[monthIdx].days;
      s = Math.max(1, Math.min(days, s));
      e2 = Math.max(s, Math.min(days, e2));
      ev.start = s; ev.end = e2; ev.day = s;
      ev.type = s === e2 ? 'day' : 'range';
      ev.kind = d2.kind;
      if (d2.kind === 'photoop') {
        ev.locId = d2.locId || null;
        const loc = d[monthIdx].locations.find(l => l.id === ev.locId);
        ev.label = loc ? loc.name : (d2.label || 'Photo op');
      } else {
        ev.locId = undefined;
        ev.label = (d2.label || '').trim() || 'Untitled event';
      }
    });
    setEditingEvent(null);
  };

  const deleteEvent = () => {
    if (!editingEvent) return;
    const evId = editingEvent.id;
    mutateData(d => {
      const events = d[monthIdx].events;
      const i = events.findIndex(e2 => e2.id === evId);
      if (i !== -1) events.splice(i, 1);
    });
    setEditingEvent(null);
  };

  const schedulePhotoOp = (locId) => {
    const loc = month.locations.find(l => l.id === locId);
    if (!loc) return;
    uidRef.current++;
    const id = 'ev-new-' + uidRef.current;
    mutateData(d => { d[monthIdx].events.push({ id, type:'day', start:1, end:1, day:1, kind:'photoop', locId, label:loc.name }); });
    setEditingEvent({ id, label:loc.name, start:'1', end:'1', kind:'photoop', locId, isNew:true });
  };

  const setDraftKind = (k) => {
    setEditingEvent(prev => {
      if (!prev) return prev;

                  ),
                  // Idea
                  e('div', { style:{ display:'grid', gridTemplateColumns:'74px 1fr', gap:16, padding:'11px 0', borderTop:'1px solid #E6DECA' } },
                    e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', paddingTop:2 } }, 'Idea'),
                    e(Editable, { key:'idea-'+sel.id, tag:'div', value:sel.idea, onCommit:(t)=>editField(sel.id,'idea',t), title:'Click to edit', style:{ fontSize:15, color:'#3B3528', lineHeight:1.5, cursor:'text', outline:'none', borderRadius:3, padding:'1px 4px', margin:'-1px -4px' } })
                  ),
                  // When
                  e('div', { style:{ display:'grid', gridTemplateColumns:'74px 1fr', gap:16, padding:'11px 0', borderTop:'1px solid #E6DECA' } },
                    e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', paddingTop:2 } }, 'When'),
                    e(Editable, { key:'when-'+sel.id, tag:'div', value:sel.when, onCommit:(t)=>editField(sel.id,'when',t), title:'Click to edit', style:{ fontSize:15, color:'#3B3528', lineHeight:1.5, cursor:'text', outline:'none', borderRadius:3, padding:'1px 4px', margin:'-1px -4px' } })
                  ),
                  // Kit
                  e('div', { style:{ display:'grid', gridTemplateColumns:'74px 1fr', gap:16, padding:'11px 0', borderTop:'1px solid #E6DECA' } },
                    e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', paddingTop:2 } }, 'Kit'),
                    e(KitField, { key:'kit-'+sel.id, value:sel.kit, onCommit:(t)=>editField(sel.id,'kit',t) })
                  )
                )
              ),
              // Footer
              e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginTop:20, paddingTop:14, borderTop:'1px solid #E6DECA', flexWrap:'wrap' } },
                e('div', { style:{ display:'flex', alignItems:'center', gap:9, flexWrap:'wrap' } },
                  sel.done
                    ? e('button', { onClick:()=>toggleDone(sel.id), style:{ display:'inline-flex', alignItems:'center', gap:7, background:'#54632F', border:'1px solid #2A251E', color:'#FBF7EC', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'8px 14px', cursor:'pointer' } }, e('span', { style:{ fontSize:12, lineHeight:1 } }, '✓'), ' Completed')
                    : e('button', { className:'done-toggle', onClick:()=>toggleDone(sel.id), style:{ display:'inline-flex', alignItems:'center', gap:7, background:'none', border:'1px solid #B3A988', color:'#5A6B2F', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'8px 14px', cursor:'pointer' } },
                        e('span', { style:{ width:12, height:12, borderRadius:'50%', border:'1.5px solid currentColor', display:'inline-block' } }),
                        ' Mark complete'
                      ),
                  e('button', { onClick:()=>schedulePhotoOp(sel.id), style:{ display:'inline-flex', alignItems:'center', gap:7, background:'none', border:'1px solid #2A251E', color:'#2A251E', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'8px 14px', cursor:'pointer' } },
                    e('span', { style:{ fontSize:12, lineHeight:1, color:'#C7902F' } }, '◉'),
                    ' Schedule photo op'
                  )
                ),
                e('button', { className:'del-btn', onClick:()=>deleteLocation(sel.id), style:{ display:'inline-flex', alignItems:'center', gap:7, background:'none', border:'1px solid #D9B3A6', color:'#9C3B22', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'8px 14px', cursor:'pointer' } },
                  e('span', { style:{ fontSize:13, lineHeight:1 } }, '✕'),
                  ' Delete location'
                )
              )
            )
          )
        : e('div', { style:{ marginTop:18, border:'1px dashed #C2B695', background:'#F1EBDB', padding:'16px 18px', fontFamily:"'IBM Plex Mono',monospace", fontSize:12, color:'#8A7D63', letterSpacing:'.02em' } }, 'Select a location above to open its shoot brief — where it is, the idea, the best timing, and the kit to pack.'),

      // Calendar
      e('div', { style:{ marginTop:40, background:'#FBF7EC', border:'1px solid #C9BD9F', boxShadow:'0 1px 0 #C9BFA4' } },
        // Light strip header
        e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:18, padding:'14px 18px', borderBottom:'1px solid #D2C7AC', background:'#F4EEDE', flexWrap:'wrap' } },
          e('div', { style:{ display:'flex', gap:20, alignItems:'center', flexWrap:'wrap' } },
            e('span', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.18em', textTransform:'uppercase', color:'#8A7D63' } }, 'Typical light'),
            e('span', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:13, color:'#54632F', letterSpacing:'.02em' } }, '↑ ' + month.sunrise + '   ↓ ' + month.sunset),
            e('span', { style:{ fontSize:13, color:'#9C8F71' } }, month.daylightNote)
          ),
          e('span', { style:{ fontFamily:"'Zilla Slab',serif", fontSize:16, fontWeight:600, color:'#7A6F58' } }, month.name + ' ' + month.year)
        ),
        // Weekday headers
        e('div', { style:{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom:'1px solid #D2C7AC', background:'#F4EEDE' } },
          (weekStart==='Sunday' ? ['S','M','T','W','T','F','S'] : ['M','T','W','T','F','S','S']).map((c, i) =>
            e('div', { key:i, style:{ padding:'9px 0', textAlign:'center', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', color:'#9C8F71' } }, c)
          )
        ),
        // Weeks
        weeks.map((wk, wi) =>
          e('div', { key:wi, style:{ position:'relative', display:'grid', gridTemplateColumns:'repeat(7,1fr)', gridAutoRows:'minmax(120px,auto)', borderBottom:'1px solid #E2D9C2', backgroundImage:'repeating-linear-gradient(to right,#ECE3CD 0,#ECE3CD 1px,transparent 1px,transparent 14.2857%)' } },
            wk.days.map((d, di) =>
              e('div', { key:di, style:{ padding:'7px 9px' } },
                d.inMonth && e('span', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:12, fontWeight:500, color:'#7A6F58' } }, d.day)
              )
            ),
            wk.items.map(it =>
              e('div', {
                key: it.id,
                title: it.label,
                className: 'ev-chip',
                onClick: () => openEventEditor(it.ev.id),
                style:{ position:'absolute', left:it.left, width:it.width, top:it.top, height:19, display:'flex', alignItems:'center', gap:5, padding:'0 6px', background:it.bg, color:it.fg, borderLeft:'3px solid '+it.accent, borderRadius:2, fontFamily:"'IBM Plex Mono',monospace", fontSize:10, fontWeight:500, lineHeight:1, whiteSpace:'nowrap', overflow:'hidden', cursor:'pointer' }
              },
                it.hasGlyph && e('span', { style:{ flex:'none' } }, it.glyph),
                e('span', { style:{ overflow:'hidden', textOverflow:'ellipsis' } }, it.label),
                it.contRight && e('span', { style:{ flex:'none', marginLeft:'auto', paddingLeft:3 } }, '→')
              )
            )
          )
        ),
        // Legend + Add event
        showEvents && e('div', { style:{ display:'flex', alignItems:'center', gap:18, flexWrap:'wrap', padding:'12px 18px', borderTop:'1px solid #D2C7AC' } },
          e('div', { style:{ display:'flex', gap:18, flexWrap:'wrap', fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.05em', color:'#8A7D63' } },
            e('span', { style:{ color:'#2A251E' } }, '◉ Photo op'),
            e('span', { style:{ color:'#3A4259' } }, '● Full moon'),
            e('span', null, '○ New moon'),
            e('span', { style:{ color:'#8A5A1B' } }, '✦ Meteor shower'),
            e('span', { style:{ color:'#9C3B22' } }, '◐ Eclipse'),
            e('span', { style:{ color:'#54632F' } }, '▬ Season window')
          ),
          e('button', { className:'add-ev-btn', onClick:addEvent, style:{ marginLeft:'auto', display:'inline-flex', alignItems:'center', gap:6, padding:'6px 12px', background:'#54632F', border:'1px solid #2A251E', color:'#FBF7EC', fontFamily:"'IBM Plex Mono',monospace", fontSize:10.5, letterSpacing:'.1em', textTransform:'uppercase', cursor:'pointer', boxShadow:'2px 2px 0 rgba(42,37,30,0.12)' } },
            e('span', { style:{ fontSize:14, lineHeight:1, marginTop:-1 } }, '+'), ' Add event'
          )
        )
      ),
      e('div', { style:{ marginTop:18, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:'#A89A7C', letterSpacing:'.03em', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' } },
        e('span', null, 'Drag a tile to reorder · tick the circle to mark a spot done.'),
        e('span', { style:{ color:'#C2B695' } }, '·'),
        e('span', null, 'Click a tile for its brief · drop a photo on its slot.')
      )
    );
  };

  // ─── Event editor modal ────────────────────────────────────────────────────
  const renderEventModal = () => {
    if (!draft || !draftView) return null;
    const kindOpts = KIND_ORDER.map(k => {
      const st = EVENT_STYLE[k];
      return { k, label:KIND_LABEL[k], ...st, sel: draft.kind===k };
    });
    const locOpts = month.locations.map(l => ({ ...l, sel: draft.locId===l.id }));

    return e('div', { onClick:()=>setEditingEvent(null), style:{ position:'fixed', inset:0, background:'rgba(42,37,30,0.34)', display:'flex', alignItems:'center', justifyContent:'center', padding:22, zIndex:60 } },
      e('div', { onClick:(ev)=>ev.stopPropagation(), style:{ width:392, maxWidth:'100%', background:'#FBF7EC', border:'1px solid #2A251E', boxShadow:'9px 9px 0 rgba(42,37,30,0.20)' } },
        e('div', { style:{ height:5, background:draftView.accent } }),
        e('div', { style:{ padding:'17px 20px 20px' } },
          e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12 } },
            e('span', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.18em', textTransform:'uppercase', color:'#8A7D63' } }, draftView.heading),
            e('button', { className:'close-btn', onClick:()=>setEditingEvent(null), style:{ width:28, height:28, background:'none', border:'1px solid #D2C7AC', color:'#8A7D63', fontSize:16, lineHeight:1, cursor:'pointer', fontFamily:"'Spectral',serif" } }, '×')
          ),
          // Preview chip
          e('div', { style:{ marginTop:15, display:'flex', alignItems:'center', gap:8, padding:'9px 11px', background:draftView.bg, color:draftView.fg, borderLeft:'3px solid '+draftView.accent, borderRadius:2, fontFamily:"'IBM Plex Mono',monospace", fontSize:11, fontWeight:500 } },
            draftView.glyph && e('span', null, draftView.glyph),
            e('span', { style:{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, draftView.previewLabel)
          ),
          // Title or location picker
          draftView.isNormal
            ? e('div', { style:{ marginTop:16 } },
                e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', marginBottom:6 } }, 'Title'),
                e('input', { value:draft.label || '', onChange:(ev)=>setEditingEvent(p=>({...p,label:ev.target.value})), placeholder:'Event name', style:{ width:'100%', background:'#FFFDF5', border:'1px solid #C9BD9F', color:'#2A251E', fontFamily:"'Spectral',serif", fontSize:15, padding:'9px 11px', outline:'none' } })
              )
            : e('div', { style:{ marginTop:16 } },
                e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', marginBottom:6 } }, 'Location card'),
                e('div', { style:{ display:'flex', flexWrap:'wrap', gap:7 } },
                  locOpts.map(lo =>
                    e('button', { key:lo.id, className:'loc-pick', onClick:()=>setEditingEvent(p=>({...p,locId:lo.id})), style:{ position:'relative', display:'flex', alignItems:'center', gap:7, padding:'7px 11px', background:'#FFFDF5', color:'#2A251E', border:'1px solid '+(lo.sel?'#54632F':'#C9BD9F'), borderRadius:2, cursor:'pointer', fontFamily:"'Spectral',serif", fontSize:13 } },
                      e('span', { style:{ width:8, height:8, borderRadius:'50%', background: lo.region==='UK' ? '#54632F' : '#9E4B26', display:'inline-block', flex:'none' } }),
                      lo.name,
                      lo.sel && e('span', { style:{ position:'absolute', top:-6, right:-6, width:17, height:17, borderRadius:'50%', background:'#2A251E', border:'1px solid #2A251E', color:'#FBF7EC', fontSize:10, lineHeight:'15px', textAlign:'center' } }, '✓')
                    )
                  )
                )
              ),
          // Start / End day
          e('div', { style:{ marginTop:14, display:'flex', gap:12 } },
            e('div', { style:{ flex:1 } },
              e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', marginBottom:6 } }, 'Start day'),
              e('input', { type:'number', min:1, max:month.days, value:draft.start, onChange:(ev)=>setEditingEvent(p=>({...p,start:ev.target.value})), style:{ width:'100%', background:'#FFFDF5', border:'1px solid #C9BD9F', color:'#2A251E', fontFamily:"'IBM Plex Mono',monospace", fontSize:15, padding:'9px 11px', outline:'none' } })
            ),
            e('div', { style:{ flex:1 } },
              e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', marginBottom:6 } }, 'End day'),
              e('input', { type:'number', min:1, max:month.days, value:draft.end, onChange:(ev)=>setEditingEvent(p=>({...p,end:ev.target.value})), style:{ width:'100%', background:'#FFFDF5', border:'1px solid #C9BD9F', color:'#2A251E', fontFamily:"'IBM Plex Mono',monospace", fontSize:15, padding:'9px 11px', outline:'none' } })
            )
          ),
          e('div', { style:{ marginTop:6, fontFamily:"'IBM Plex Mono',monospace", fontSize:10, color:'#A89A7C', letterSpacing:'.04em' } }, month.name + ' · days 1–' + month.days),
          // Type
          e('div', { style:{ marginTop:16 } },
            e('div', { style:{ fontFamily:"'IBM Plex Mono',monospace", fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'#9C8F71', marginBottom:8 } }, 'Type'),
            e('div', { style:{ display:'flex', flexWrap:'wrap', gap:8 } },
              kindOpts.map(k =>
                e('button', { key:k.k, className:'kind-btn', onClick:()=>setDraftKind(k.k), style:{ position:'relative', display:'flex', alignItems:'center', gap:7, padding:'6px 11px 6px 9px', background:k.bg, color:k.fg, border:'1px solid '+k.accent, borderRadius:2, cursor:'pointer', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.03em' } },
                  e('span', { style:{ width:10, height:10, borderRadius:'50%', background:k.accent, display:'inline-block', flex:'none' } }),
                  k.label,
                  k.sel && e('span', { style:{ position:'absolute', top:-6, right:-6, width:17, height:17, borderRadius:'50%', background:'#FBF7EC', border:'1px solid #2A251E', color:'#2A251E', fontSize:10, lineHeight:'15px', textAlign:'center' } }, '✓')
                )
              )
            )
          ),
          // Save / Delete
          e('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, marginTop:22, paddingTop:15, borderTop:'1px solid #E6DECA' } },
            e('button', { className:'del-btn', onClick:deleteEvent, style:{ display:'inline-flex', alignItems:'center', gap:7, background:'none', border:'1px solid #D9B3A6', color:'#9C3B22', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'8px 13px', cursor:'pointer' } },
              e('span', { style:{ fontSize:13, lineHeight:1 } }, '✕'), ' Delete'
            ),
            e('button', { className:'save-btn', onClick:saveEvent, style:{ display:'inline-flex', alignItems:'center', gap:7, background:'#54632F', border:'1px solid #2A251E', color:'#FBF7EC', fontFamily:"'IBM Plex Mono',monospace", fontSize:11, letterSpacing:'.1em', textTransform:'uppercase', padding:'9px 17px', cursor:'pointer', boxShadow:'3px 3px 0 rgba(42,37,30,0.14)' } }, 'Save event')
          )
        )
      )
    );
  };

  return e('div', { style:{ minHeight:'100vh', background:'#E5DCC6', backgroundImage:'radial-gradient(#dccfb3 0.8px, transparent 0.8px)', backgroundSize:'22px 22px', color:'#2A251E', fontFamily:"'Spectral',Georgia,serif", padding:'36px 26px 70px' } },
    e('div', { style:{ maxWidth:1180, margin:'0 auto' } },
      mapView
        ? e(MapView, { places: mapPlaces, onOpenMonth: goToMonth, onToggleVisited: toggleVisitedById, onBack: goToYear })
        : (yearView ? renderYearPage() : renderMonthPage()),
      renderEventModal()
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
